<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday 💖</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    background: #0f0f1a;
    color: #fff;
    overflow: hidden;
}

/* Screens */
.screen {
    display: none;

/* Button */
button {

/* Slideshow */
.slideshow {

.slideshow img {
    width: 100%;

    position: absolute;
    opacity: 0;

    transition: 1s;
}
.slideshow img.active { opacity: 1; }

/* Typing */
#typing {

    width: 80%;
}

/* Cake */
.cake {

    cursor: pointer;
}

/* Signature */
.signature {
    opacity: 0;
    margin-top: 20px;
    transition: 2s;
}

/* Video */
video {
    width: 260px;
    border-radius: 10px;
    margin-top: 15px;
}

/* Hearts */
.heart {
    position: absolute;
    color: #ff4e88;
    font-size: 20px;
    animation: float 5s linear infinite;

@keyframes float {
    0% { transform: translateY(100vh); }
    100% { transform: translateY(-10vh); }
}

canvas {
    position: fixed;
}
</style>

</head>
<body>

<audio id="music" loop>
    <source src="song.mp3">
</audio>

<canvas id="confetti"></canvas>

<!-- Screen 1 -->
<div class="screen active" id="start">
    <h1>💌 I Made This For You 💖</h1>
    <button onclick="startApp()">Open</button>
</div>

<!-- Screen 2 -->
<div class="screen" id="main">
    <h1>🎂 HAPPY BIRTHDAY 🎂</h1>
    <h2>💖 DEAR TRIPTI 💖</h2>

    <!-- Photos -->
    <div class="slideshow">
        <img src="WhatsApp Image 2026-04-26 at 5.17.31" class="active">
        <img src="WhatsApp Image 2026-04-26 at 5.17.30">
        <img src="WhatsApp Image 2026-04-26 at 5.17.30">
    </div>

    <!-- 🎥 Video -->
    <video controls>
        <source src="video.mp4">
    </video>

    <p>Click cake 🎂</p>
    <div class="cake" onclick="startAll()">🎂</div>

    <div id="typing"></div>

    <div class="signature" id="sign">
        ❤️ FROM ARGHADIP ❤️
    </div>
</div>

<script>
// Start App
function startApp() {
    document.getElementById("start").classList.remove("active");
    document.getElementById("main").classList.add("active");

    document.getElementById("music").play();
    startSlideshow();
    createHearts();
}

// Slideshow
let i = 0;
function startSlideshow() {
    let slides = document.querySelectorAll(".slideshow img");
    setInterval(() => {
        slides[i].classList.remove("active");
        i = (i + 1) % slides.length;
        slides[i].classList.add("active");
    }, 2000);
}

// Cake click
function startAll() {
    typingEffect();
    startConfetti();
}

// Typing
const msg = "Tu meri life ka sabse special person hai 💖\n" +
"Tere bina sab incomplete lagta hai 😌\n" +
"Main hamesha tere saath rahunga 💫\n\n" +
"🎉 HAPPY BIRTHDAY 🎉";

let index = 0;
function typingEffect() {
    let box = document.getElementById("typing");

    let interval = setInterval(() => {
        box.innerHTML += msg.charAt(index);
        index++;
        if (index >= msg.length) {
            clearInterval(interval);
            document.getElementById("sign").style.opacity = 1;
        }
    }, 50);
}

// Hearts
function createHearts() {
    setInterval(() => {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "💖";
        heart.style.left = Math.random() * 100 + "vw";
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 5000);
    }, 300);
}

// Confetti
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let confetti = [];

function startConfetti() {
    for (let i = 0; i < 200; i++) {
        confetti.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 6 + 2,
            d: Math.random() * 10
        });
    }
    animate();
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    confetti.forEach((c, i) => {
        ctx.beginPath();
        ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
        ctx.fillStyle = "#ff4e88";
        ctx.fill();

        c.y += c.d;
        if (c.y > canvas.height) confetti[i].y = 0;
    });

    requestAnimationFrame(animate);
}
</script>

</body>
</html>
